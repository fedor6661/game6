WIDTH, HEIGHT = 600, 600  # 3x200 = 600
CELL_SIZE = 200
ROWS, COLS = 3, 3
# Цвета
WHITE = (255, 255, 255)
BLACK = (0, 0, 0)
GRAY = (200, 200, 200)
# Создание окна
screen = pygame.display.set_mode((WIDTH, HEIGHT))
pygame.display.set_caption("Поле 3x3")
# Загрузка спрайта
sprite = pygame.image.load("image_2026-02-12_18-00-04 (2)")
# Матрица для хранения состояния клеток (True = спрайт отображен)
grid_state = [
    [False, False, False],
    [False, False, False],
    [False, False, False],
]
# Функция отрисовки сетки
def draw_grid():
    for row in range(ROWS):
        for col in range(COLS):
            # Рисуем клетку
            rect = pygame.Rect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE)
            # pygame.draw.rect(screen, WHITE, rect)
            # pygame.draw.rect(screen, GRAY, rect, 1)
           
            # Если в клетке есть спрайт, отрисовываем его
            if grid_state[row][col]:
                screen.blit(sprite, (col * CELL_SIZE, row * CELL_SIZE))
# Главный цикл
running = True
while running:
    for event in pygame.event.get():
        if event.type == pygame.QUIT:
            running = False
       
        # Обработка клика мыши
        elif event.type == pygame.MOUSEBUTTONDOWN:
            if event.button == 1:  # Левая кнопка мыши
                x, y = event.pos
                # Определяем, в какую клетку кликнули
                col = x // CELL_SIZE
                row = y // CELL_SIZE
               
                # Проверяем, что клик в пределах сетки
                if 0 <= row < ROWS and 0 <= col < COLS:
                    # Переключаем состояние клетки
                    grid_state[row][col] = not grid_state[row][col]
   
    # Отрисовка
    screen.fill(BLACK)
    draw_grid()
    pygame.display.flip()
# Выход из игры
pygame.quit()